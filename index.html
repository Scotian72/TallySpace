<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TallySpace Foundation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <h1>TallySpace Simulation</h1>

      <section class="stats">
        <p><strong>Current Day:</strong> <span id="current-day">1</span></p>
        <p><strong>Company Cash:</strong> <span id="company-cash">$0</span></p>
        <p><strong>Ships:</strong> <span id="ship-count">0</span></p>
        <p><strong>Crew:</strong> <span id="crew-count">0</span></p>
        <p><strong>Ship Fuel:</strong> <span id="ship-fuel">0/0</span></p>
      </section>

      <section class="controls">
        <button id="advance-1-day" type="button">Advance 1 Day</button>
        <button id="advance-10-days" type="button">Advance 10 Days</button>
        <button id="rest-crew" type="button">Rest Crew</button>
        <button id="refuel-ship" type="button">Refuel</button>
        <button id="export-data" type="button">Export Data</button>
        <button id="copy-export-data" type="button">Copy Export JSON</button>
        <label for="ship-mode">
          Ship Mode
          <select id="ship-mode">
            <option value="LOW">LOW</option>
            <option value="NORMAL" selected>NORMAL</option>
            <option value="HIGH">HIGH</option>
          </select>
        </label>
      </section>

      <section class="panel">
        <h2>Company Crew</h2>
        <ul id="company-crew" class="crew-list"></ul>
      </section>

      <section class="panel">
        <h2>Recruitment</h2>
        <ul id="recruitment-list" class="crew-list"></ul>
      </section>

      <section class="events">
        <h2>Event Log</h2>
        <ul id="event-log"></ul>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
